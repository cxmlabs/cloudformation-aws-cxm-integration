AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  # CXM Accounts
  CXMExternalId:
    Type: String
    Description: External ID provided by CXM for this deployment
  CXMCustomerAccountId:
    Type: String
    Description: 12-digit CXM AWS account ID provided by CXM (used to authorize cross-account access)
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a 12-digit AWS account ID
  # Accounts
  ManagementAccountId:
    Type: String
    Description: Your 12-digit AWS Organizations management account ID
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a 12-digit AWS account ID
  # Prefix
  Prefix:
    Type: String
    Default: cxm
    Description: Generic ID to namespace the stacks

Resources:

  ################################################################
  #
  # Asset Crawler
  #
  ################################################################
  CxmAssetCrawlerRole:
    Type: AWS::IAM::Role
    DependsOn: CloudFormationNotifier
    Properties:
      RoleName: !Sub '${Prefix}-asset-crawler'
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/ReadOnlyAccess"
        - "arn:aws:iam::aws:policy/ServiceQuotasFullAccess"
        - "arn:aws:iam::aws:policy/AWSSavingsPlansFullAccess"
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - ecs-tasks.amazonaws.com
                - codebuild.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Sub '${CXMExternalId}'
          - Effect: Allow
            Action:
              - sts:AssumeRole
              - sts:TagSession
            Principal:
              AWS: !Sub "arn:aws:iam::${ManagementAccountId}:role/${Prefix}-organization-crawler"

  InventoryPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${Prefix}-asset-crawler-readonly'
      Roles:
        - !Ref 'CxmAssetCrawlerRole'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CommitmentManagementPermissions
            Effect: Allow
            Resource: "*"
            Action:
              # DynamoDB Reservations
              - dynamodb:DescribeReservedCapacity
              - dynamodb:DescribeReservedCapacityOfferings
              - dynamodb:PurchaseReservedCapacityOfferings
              # EC2 Reservations
              - ec2:DescribeReserved*
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeAccountAttributes
              - ec2:DescribeRegions
              - ec2:DescribeInstances
              - ec2:DescribeInstanceTypes
              - ec2:DescribeTags
              - ec2:GetReserved*
              - ec2:ModifyReservedInstances
              - ec2:PurchaseReservedInstancesOffering
              - ec2:CreateReservedInstancesListing
              - ec2:CancelReservedInstancesListing
              - ec2:GetReservedInstancesExchangeQuote
              - ec2:AcceptReservedInstancesExchangeQuote
              # RDS Reservations
              - rds:DescribeReserved*
              - rds:ListTagsForResource*
              - rds:PurchaseReservedDBInstancesOffering
              # Redshift Reservations
              - redshift:DescribeReserved*
              - redshift:DescribeTags
              - redshift:GetReserved*
              - redshift:AcceptReservedNodeExchange
              - redshift:PurchaseReservedNodeOffering
              # ElastiCache Reservations
              - elasticache:DescribeReserved*
              - elasticache:ListTagsForResource
              - elasticache:PurchaseReservedCacheNodesOffering
              # ElasticSearch Reservations
              - es:DescribeReserved*
              - es:ListTags
              - es:PurchaseReservedElasticsearchInstanceOffering
              - es:PurchaseReservedInstanceOffering
              # memoryDB
              - memorydb:DescribeReserved*
              - memorydb:ListTags
              - memorydb:PurchaseReservedNodesOffering
              # Saving Plans full management
              - savingsplans:*
          # Scaling & stop/start permissions (FinOps cost optimization)
          - Sid: SchedulingPermissions
            Effect: Allow
            Resource: "*"
            Action:
              # ECS Scaling
              - ecs:UpdateService
              # EC2 Stop/Start
              - ec2:StartInstances
              - ec2:StopInstances
              # RDS Stop/Start
              - rds:StartDBInstance
              - rds:StopDBInstance
              - rds:StartDBCluster
              - rds:StopDBCluster
              # Lambda Concurrency
              - lambda:PutProvisionedConcurrencyConfig
              - lambda:DeleteProvisionedConcurrencyConfig
              - lambda:PutFunctionConcurrency
              - lambda:DeleteFunctionConcurrency
              # EKS Nodegroup Scaling
              - eks:UpdateNodegroupConfig
              # ASG Scaling
              - autoscaling:UpdateAutoScalingGroup
              - autoscaling:SetDesiredCapacity
              # Application Auto Scaling
              - application-autoscaling:RegisterScalableTarget
              # ElastiCache Scaling
              - elasticache:ModifyReplicationGroup
              - elasticache:ModifyCacheCluster
              # Redshift Scaling
              - redshift:PauseCluster
              - redshift:ResumeCluster
              - redshift:ResizeCluster
              # SageMaker Scaling
              - sagemaker:UpdateEndpointWeightsAndCapacities
          # Explicitly denying data plane API Calls
          - Effect: Deny
            Resource: "*"
            Action:
              - athena:StartCalculationExecution
              - athena:StartQueryExecution
              - dynamodb:GetItem
              - dynamodb:BatchGetItem
              - dynamodb:Query
              - dynamodb:Scan
              - ec2:GetConsoleOutput
              - ec2:GetConsoleScreenshot
              - ecr:BatchGetImage
              - ecr:GetAuthorizationToken
              - ecr:GetDownloadUrlForLayer
              - kinesis:GetRecords
              - kinesis:GetShardIterator
              - lambda:GetFunction
              - logs:GetLogEvents
              - sdb:Select*
              - sqs:ReceiveMessage
              - rds-data:*

  ################################################################
  #
  # Notifications for Feedback Loop
  #
  ################################################################
  IAMCrossAccountNotificationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Prefix}-feedback-loop-control-plane'
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: cross-account-event-forwarder
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: "events:PutEvents"
                Resource: !Sub "arn:aws:events:*:${CXMCustomerAccountId}:event-bus/control-plane"

  CloudFormationNotifier:
    Type: AWS::Events::Rule
    Properties:
      Description: Notifies when one of our CloudFormation Stack changes state
      EventPattern:
        resources:
          - wildcard: !Sub "*${Prefix}*"
        source:
          - aws.cloudformation
        detail-type:
          - "CloudFormation Stack Status Change"
          - "CloudFormation StackSet StackInstance Status Change"
        detail:
          status-details:
            status: [
              "CREATE_COMPLETE",
              "CREATE_FAILED",
              "DELETE_COMPLETE",
              "DELETE_FAILED",
              "ROLLBACK_COMPLETE",
              "ROLLBACK_FAILED",
              "UPDATE_COMPLETE",
              "UPDATE_FAILED",
              "UPDATE_ROLLBACK_COMPLETE",
              "UPDATE_ROLLBACK_FAILED"
            ]
      State: "ENABLED"
      Targets:
        - Id: CloudFormationNotifier
          Arn: !Sub "arn:aws:events:${AWS::Region}:${CXMCustomerAccountId}:event-bus/control-plane"
          RoleArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/${Prefix}-feedback-loop-control-plane"

Outputs:
  # Diagnostic
  Prefix:
    Description: Namespace prefix used for resource names
    Value: !Ref Prefix
  ManagementAccountId:
    Description: AWS Organizations management account ID
    Value: !Ref ManagementAccountId
  DeployedAccountId:
    Description: Actual AWS account ID where this stack is running
    Value: !Ref AWS::AccountId
  DeployedRegion:
    Description: Actual AWS region where this stack is running
    Value: !Ref AWS::Region

  # Asset crawler
  CxmAssetCrawlerRoleArn:
    Description: ARN of the Asset Crawler IAM Role
    Value: !GetAtt CxmAssetCrawlerRole.Arn
  CxmAssetCrawlerRoleId:
    Description: Id of the Asset Crawler IAM Role
    Value: !GetAtt CxmAssetCrawlerRole.RoleId

  # Verification
  CXMCustomerAccountId:
    Description: CXM account ID trusted in role assume policies
    Value: !Ref CXMCustomerAccountId
