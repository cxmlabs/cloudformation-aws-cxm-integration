AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  # CXM Accounts
  CXMExternalId:
    Type: String
    Description: External ID provided by CXM for this deployment
  CXMCustomerAccountId:
    Type: String
    Description: 12-digit CXM AWS account ID provided by CXM (used to authorize cross-account access)
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a 12-digit AWS account ID
  # CUR Bucket
  CostAndUsageReportS3BucketName:
    Type: String
    Description: Name of the S3 bucket used to store CUR data (bucket name only, not the ARN — e.g. "my-cur-bucket", not "arn:aws:s3:::my-cur-bucket")
    AllowedPattern: '^[a-z0-9][a-z0-9.\-]{1,61}[a-z0-9]$'
    ConstraintDescription: "Must be an S3 bucket name (not an ARN). Example: my-cur-bucket"
  CostAndUsageReportS3BucketKmsKeyArn:
    Type: String
    Default: ''
    Description: Optional — ARN of the KMS key used to encrypt CUR data (e.g. "arn:aws:kms:us-east-1:123456789012:key/abc-def"). Leave empty if not encrypted with a custom key.
    AllowedPattern: '^(arn:aws:kms:[a-z0-9-]+:\d{12}:key/[a-f0-9-]+)?$'
    ConstraintDescription: Must be a valid KMS key ARN or empty
  # Regions
  CostAndUsageBucketRegion:
    Type: String
    Default: "us-east-1"
    Description: Region where the CUR S3 bucket lives. Deploy this stack to this region for full functionality.
  # Prefix
  Prefix:
    Type: String
    Default: cxm
    Description: Generic ID to namespace the stacks

Conditions:
  isCostAndUsageBucketRegion: !Equals [!Ref AWS::Region, !Ref CostAndUsageBucketRegion]
  isCURKmsKeyArnSet: !Not [ !Equals [ !Ref CostAndUsageReportS3BucketKmsKeyArn, '' ] ]

Resources:

  ################################################################
  #
  # Organization Crawler
  #
  ################################################################
  CxmOrganizationCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Prefix}-organization-crawler'
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AWSOrganizationsReadOnlyAccess"
        - "arn:aws:iam::aws:policy/ReadOnlyAccess"
        - "arn:aws:iam::aws:policy/ServiceQuotasFullAccess"
        - "arn:aws:iam::aws:policy/AWSSavingsPlansFullAccess"
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sts:AssumeRole
              - sts:TagSession
            Principal:
              AWS: !Sub "arn:aws:iam::${CXMCustomerAccountId}:root"
            Condition:
              StringEquals:
                sts:ExternalId: !Sub '${CXMExternalId}'
  CxmOrganizationReadOnlyPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${Prefix}-organization-crawler-readonly-policy'
      Roles:
        - !Ref CxmOrganizationCrawlerRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CommitmentManagementPermissions
            Effect: Allow
            Resource: "*"
            Action:
              # DynamoDB Reservations
              - dynamodb:DescribeReservedCapacity
              - dynamodb:DescribeReservedCapacityOfferings
              - dynamodb:PurchaseReservedCapacityOfferings
              # EC2 Reservations
              - ec2:DescribeReserved*
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeAccountAttributes
              - ec2:DescribeRegions
              - ec2:DescribeInstances
              - ec2:DescribeInstanceTypes
              - ec2:DescribeTags
              - ec2:GetReserved*
              - ec2:ModifyReservedInstances
              - ec2:PurchaseReservedInstancesOffering
              - ec2:CreateReservedInstancesListing
              - ec2:CancelReservedInstancesListing
              - ec2:GetReservedInstancesExchangeQuote
              - ec2:AcceptReservedInstancesExchangeQuote
              # RDS Reservations
              - rds:DescribeReserved*
              - rds:ListTagsForResource*
              - rds:PurchaseReservedDBInstancesOffering
              # Redshift Reservations
              - redshift:DescribeReserved*
              - redshift:DescribeTags
              - redshift:GetReserved*
              - redshift:AcceptReservedNodeExchange
              - redshift:PurchaseReservedNodeOffering
              # ElastiCache Reservations
              - elasticache:DescribeReserved*
              - elasticache:ListTagsForResource
              - elasticache:PurchaseReservedCacheNodesOffering
              # ElasticSearch Reservations
              - es:DescribeReserved*
              - es:ListTags
              - es:PurchaseReservedElasticsearchInstanceOffering
              - es:PurchaseReservedInstanceOffering
              # memoryDB
              - memorydb:DescribeReserved*
              - memorydb:ListTags
              - memorydb:PurchaseReservedNodesOffering
              # Saving Plans full management
              - savingsplans:*
          - Sid: ManageReportDefinitions
            Effect: Allow
            Action:
              - cur:DescribeReportDefinitions
              - cur:ListTagsForResource
              - cur:ModifyReportDefinition
              - cur:PutReportDefinition
              - bcm-data-exports:List*
              - bcm-data-exports:Get*
              - bcm-data-exports:ListTagsForResource
              - ce:DescribeCostCategoryDefinition
              - ce:DescribeNotificationSubscription
              - ce:Describe*
              - ce:Get*
              - ce:List*
              - ec2:DescribeRegions
            Resource: "*"
          - Sid: CostOptimizationHubReadOnlyAccess
            Effect: Allow
            Action:
              - cost-optimization-hub:List*
              - cost-optimization-hub:Get*
            Resource: "*"
          - Sid: SSOReadOnlyAccess
            Effect: Allow
            Action:
              - sso-directory:Search*
              - sso-directory:Describe*
              - sso-directory:List*
              - sso-directory:Get*
              - sso:List*
              - sso:Get*
              - identitystore:Describe*
              - identitystore:List*
            Resource: "*"
          - Sid: ExplicitDenyToDataPlane
            Effect: Deny
            Action:
              - athena:StartCalculationExecution
              - athena:StartQueryExecution
              - dynamodb:GetItem
              - dynamodb:BatchGetItem
              - dynamodb:Query
              - dynamodb:Scan
              - ec2:GetConsoleOutput
              - ec2:GetConsoleScreenshot
              - ecr:BatchGetImage
              - ecr:GetAuthorizationToken
              - ecr:GetDownloadUrlForLayer
              - kinesis:GetRecords
              - kinesis:GetShardIterator
              - lambda:GetFunction
              - logs:GetLogEvents
              - sdb:Select*
              - sqs:ReceiveMessage
              - rds-data:*
            Resource: "*"
          - Sid: AssumeRoleToMemberAccounts
            Effect: Allow
            Action:
              - sts:AssumeRole
            Resource: !Sub "arn:aws:iam::*:role/${Prefix}*"

  ################################################################
  #
  # Cost and Usage Reader (only in CUR bucket region)
  #
  ################################################################
  CxmCostAndUsageReaderRole:
    Type: AWS::IAM::Role
    Condition: isCostAndUsageBucketRegion
    Properties:
      RoleName: !Sub '${Prefix}-cur-reader'
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sts:AssumeRole
              - sts:TagSession
            Principal:
              AWS: !Sub "arn:aws:iam::${CXMCustomerAccountId}:root"
            Condition:
              StringEquals:
                sts:ExternalId: !Sub '${CXMExternalId}'
  CxmCostAndUsageReaderPolicy:
    Type: AWS::IAM::Policy
    Condition: isCostAndUsageBucketRegion
    Properties:
      PolicyName: !Sub '${Prefix}-cur-reader-policy'
      Roles:
        - !Ref 'CxmCostAndUsageReaderRole'
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "s3:ListBucket"
            Resource: !Sub "arn:aws:s3:::${CostAndUsageReportS3BucketName}"
          - Effect: Allow
            Action:
              - "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${CostAndUsageReportS3BucketName}/*"
          - "Fn::If":
            - isCURKmsKeyArnSet
            - Effect: Allow
              Action:
                - "kms:Decrypt"
                - "kms:GenerateDataKey"
              Resource: !Ref CostAndUsageReportS3BucketKmsKeyArn
            - !Ref AWS::NoValue

  ################################################################
  #
  # Notifications
  #
  ################################################################
  CxmNotificationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Prefix}-notification"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: "sts:AssumeRole"
            Principal:
              Service: "events.amazonaws.com"

  CxmNotificationRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${Prefix}-cur-notification-data-plane-policy"
      Roles:
        - !Ref CxmNotificationRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: "events:PutEvents"
            Resource:
              - !Sub "arn:aws:events:*:${CXMCustomerAccountId}:event-bus/data-plane*"
              - !Sub "arn:aws:events:*:${CXMCustomerAccountId}:event-bus/control-plane*"

  ################################################################
  #
  # Cost and Usage Notifications
  #
  ################################################################
  CxmCURBucketEventRule:
    Type: AWS::Events::Rule
    Condition: isCostAndUsageBucketRegion
    Properties:
      Name: !Sub "${Prefix}-s3-bucket-change-notifier"
      Description: "Notifies when changes happen to files in the CUR S3 bucket"
      EventPattern:
        source:
          - "aws.s3"
        detail-type:
          - "Object Created"
          - "Object Deleted"
        detail:
          bucket:
            name:
              - !Ref CostAndUsageReportS3BucketName
      Targets:
        - Id: "SendToDataPlaneBus"
          Arn: !Sub "arn:aws:events:${AWS::Region}:${CXMCustomerAccountId}:event-bus/data-plane"
          RoleArn: !GetAtt CxmNotificationRole.Arn


  ################################################################
  #
  # Notifications about infra changes
  #
  ################################################################
  CxmOrganizationChangesEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Prefix}-organization-changes"
      Description: "Notifies when changes happen to the organization such as adding an account"
      EventPattern:
        source:
          - "aws.organizations"
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "organizations.amazonaws.com"
          readOnly:
            - false
          managementEvent:
            - true
      Targets:
        - Id: "SendToControlPlaneBus"
          Arn: !Sub "arn:aws:events:${AWS::Region}:${CXMCustomerAccountId}:event-bus/control-plane"
          RoleArn: !GetAtt CxmNotificationRole.Arn

  CxmOrganizationAccessEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Prefix}-organization-access"
      Description: "Notifies when the IAM Role used to access the Organization is deployed"
      EventPattern:
        source:
          - "aws.iam"
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventName:
            - "CreateRole"
            - "DeleteRole"
          managementEvent:
            - true
          requestParameters:
            roleName:
              - wildcard: !Sub "*${Prefix}*"
      Targets:
        - Id: "SendToControlPlaneBus"
          Arn: !Sub "arn:aws:events:${AWS::Region}:${CXMCustomerAccountId}:event-bus/control-plane"
          RoleArn: !GetAtt CxmNotificationRole.Arn

  CxmOrganizationCloudFormationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Prefix}-organization-cloudformation"
      Description: "Notifies when the StackSet used to deploy an account is updated"
      EventPattern:
        source:
          - "aws.cloudformation"
        detail-type:
          - "CloudFormation StackSet StackInstance Status Change"
          - "CloudFormation StackSet Status Change"
        detail:
          status-details:
            status:
              - "CREATE_COMPLETE"
              - "CREATE_FAILED"
              - "DELETE_COMPLETE"
              - "DELETE_FAILED"
              - "ROLLBACK_COMPLETE"
              - "ROLLBACK_FAILED"
              - "UPDATE_COMPLETE"
              - "UPDATE_FAILED"
              - "UPDATE_ROLLBACK_COMPLETE"
              - "UPDATE_ROLLBACK_FAILED"
      Targets:
        - Id: "SendToControlPlaneBus"
          Arn: !Sub "arn:aws:events:${AWS::Region}:${CXMCustomerAccountId}:event-bus/control-plane"
          RoleArn: !GetAtt CxmNotificationRole.Arn

################################################################
#
# Outputs
#
################################################################
Outputs:
  # Diagnostic: deployment info
  DeployedAccountId:
    Description: AWS account ID where this stack is deployed
    Value: !Ref AWS::AccountId
  DeployedRegion:
    Description: AWS region where this stack is deployed
    Value: !Ref AWS::Region
  Prefix:
    Description: Namespace prefix used for resource names
    Value: !Ref Prefix

  # Diagnostic: resource creation status
  CURReaderCreated:
    Description: Whether the CUR Reader role was created in this region
    Value: !If [isCostAndUsageBucketRegion, "YES", "NO — redeploy to the CUR bucket region"]
  ResourcesCreated:
    Description: Summary of created resources
    Value: !If
      - isCostAndUsageBucketRegion
      - "All resources created (org crawler, CUR reader, notifications)"
      - !Sub "Partial: org crawler + notifications created, but CUR reader requires deployment to ${CostAndUsageBucketRegion}"

  # Organization crawler
  CxmOrganizationCrawlerRoleArn:
    Description: ARN of the Organization Crawler IAM Role
    Value: !GetAtt CxmOrganizationCrawlerRole.Arn
  CxmOrganizationCrawlerRoleId:
    Description: Id of the Organization Crawler IAM Role
    Value: !GetAtt CxmOrganizationCrawlerRole.RoleId

  # Cost and Usage Reader
  CxmCostAndUsageReaderRoleArn:
    Description: ARN of the CUR Reader IAM Role
    Value: !GetAtt CxmCostAndUsageReaderRole.Arn
    Condition: isCostAndUsageBucketRegion
  CxmCostAndUsageReaderRoleId:
    Description: Id of the CUR Reader IAM Role
    Value: !GetAtt CxmCostAndUsageReaderRole.RoleId
    Condition: isCostAndUsageBucketRegion
  CostAndUsageReportS3BucketName:
    Description: Name of the S3 bucket used to store CUR data
    Value: !Ref CostAndUsageReportS3BucketName
  CostAndUsageReportS3BucketKmsKeyArn:
    Description: ARN of the KMS Key used to encrypt CUR data
    Value: !Ref CostAndUsageReportS3BucketKmsKeyArn
  CostAndUsageBucketRegion:
    Description: Cost and Usage Bucket region
    Value: !Ref CostAndUsageBucketRegion

  # Notification role
  CxmNotificationRoleArn:
    Description: ARN of the Notification IAM Role
    Value: !GetAtt CxmNotificationRole.Arn
  CXMCustomerAccountId:
    Description: CXM account ID trusted in role assume policies
    Value: !Ref CXMCustomerAccountId
